<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#2563eb"/>
  <!-- running figure (simplified) -->
  <!-- head -->
  <circle cx="20" cy="7" r="2.5" fill="white"/>
  <!-- torso leaning forward -->
  <line x1="20" y1="9.5" x2="15" y2="17" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- rear arm up -->
  <line x1="18" y1="12" x2="22" y2="9" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- front arm down-forward -->
  <line x1="18" y1="12" x2="13" y2="15" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- rear leg back -->
  <line x1="15" y1="17" x2="19" y2="24" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="19" y1="24" x2="23" y2="24" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- front leg forward -->
  <line x1="15" y1="17" x2="11" y2="23" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="11" y1="23" x2="8"  y2="26" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
</svg>
