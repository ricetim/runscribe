server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compression — cuts transfer size 60-80% for JSON and JS
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/x-font-ttf font/opentype image/svg+xml;

    # Hashed JS/CSS assets — immutable, cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html — never cache (ensures users always get latest app shell)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Pre-built static JSON snapshots — reads never hit Python
    location /static/ {
        alias /data/static/;
        add_header Cache-Control "no-cache";
        default_type application/json;
    }

    # API proxy — forward to FastAPI backend
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8000;
        proxy_pass $backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Forward Accept-Encoding so FastAPI GZip middleware can respond compressed
        proxy_set_header Accept-Encoding $http_accept_encoding;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
